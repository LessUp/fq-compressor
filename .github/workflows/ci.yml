name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-18 libc++-18-dev libc++abi-18-dev ninja-build
          pip install conan --quiet

      - name: Conan install
        run: |
          conan profile detect --force
          conan install . --build=missing -s build_type=Debug

      - name: Build (clang-debug)
        run: ./scripts/build.sh clang-debug

      - name: Test (clang-debug)
        run: ./scripts/test.sh clang-debug

      - name: Format check
        run: ./scripts/lint.sh format-check
