name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-18 clang-format-18 libc++-18-dev libc++abi-18-dev ninja-build
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-18 100
          pip install conan --quiet

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ hashFiles('conanfile.py') }}

      - name: Conan install
        run: |
          conan profile detect --force
          conan install . --output-folder=build/clang-debug --build=missing \
            -s build_type=Debug \
            -s compiler=clang \
            -s compiler.version=18 \
            -s compiler.libcxx=libc++ \
            -s compiler.cppstd=23

      - name: Build (clang-debug)
        run: ./scripts/build.sh clang-debug

      - name: Test (clang-debug)
        run: ./scripts/test.sh clang-debug

      - name: Format check
        run: ./scripts/lint.sh format-check
