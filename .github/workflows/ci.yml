# .github/workflows/ci.yml
# =============================================================================
# fq-compressor CI Pipeline
# =============================================================================
# This workflow validates formatting and build/test health using the current
# scripts and preset layout in this repository.
# =============================================================================

name: fq-compressor CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_IMAGE_NAME: fqcompressor-ci

jobs:
  # ===========================================================================
  # Build and Test Job
  # ===========================================================================
  # Builds the project with multiple compilers and runs unit tests.
  # Format checking is handled by the separate quality.yml workflow.
  # Requirement 7.5: Reproducible builds via CMakePresets.json
  # ===========================================================================
  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - gcc-release
          - clang-debug
          - clang-release

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.preset }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.preset }}-
            ${{ runner.os }}-ccache-

      - name: Prepare container cache mounts
        run: |
          mkdir -p "$HOME/.conan2" "$HOME/.cache/ccache"

      - name: Build CI toolchain image
        run: |
          docker build \
            -f docker/Dockerfile.dev \
            --target base \
            -t ${{ env.CI_IMAGE_NAME }}:${{ matrix.preset }} \
            .

      - name: Build via script
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.conan2:/tmp/conan2" \
            -v "$HOME/.cache/ccache:/tmp/ccache" \
            -e HOME=/tmp \
            -e CONAN_HOME=/tmp/conan2 \
            -e CCACHE_DIR=/tmp/ccache \
            -e PATH=/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:${{ matrix.preset }} \
            ./scripts/build.sh ${{ matrix.preset }}

      - name: Run tests via script
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.conan2:/tmp/conan2" \
            -v "$HOME/.cache/ccache:/tmp/ccache" \
            -e HOME=/tmp \
            -e CONAN_HOME=/tmp/conan2 \
            -e CCACHE_DIR=/tmp/ccache \
            -e PATH=/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:${{ matrix.preset }} \
            ./scripts/test.sh ${{ matrix.preset }}

      - name: Upload build artifacts
        if: endsWith(matrix.preset, 'release')
        uses: actions/upload-artifact@v4
        with:
          name: fqcompressor-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/src/fqc
          retention-days: 7

  # ===========================================================================
  # Commit Lint Job (PR only)
  # ===========================================================================
  # Validates commit messages follow Conventional Commits format.
  # ===========================================================================
  commit-lint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js for commitlint
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install commitlint and run
        run: |
          npm install @commitlint/cli @commitlint/config-conventional
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
