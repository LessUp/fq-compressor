# .github/workflows/ci.yml
# =============================================================================
# fq-compressor CI Pipeline
# =============================================================================
# This workflow validates formatting and build/test health using the current
# scripts and preset layout in this repository.
# =============================================================================

name: fq-compressor CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  CONAN_VERSION: 2.24.0

jobs:
  # ===========================================================================
  # Format Check Job
  # ===========================================================================
  # Validates code formatting against .clang-format rules.
  # Requirement 7.3: Code style enforcement
  # ===========================================================================
  format-check:
    name: Format Check (clang-format)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: ./scripts/lint.sh format-check

  # ===========================================================================
  # Build and Test Job
  # ===========================================================================
  # Builds the project with multiple compilers and runs unit tests.
  # Requirement 7.5: Reproducible builds via CMakePresets.json
  # ===========================================================================
  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    runs-on: ubuntu-latest
    needs: format-check
    strategy:
      fail-fast: false
      matrix:
        preset:
          - gcc-release
          - clang-debug
          - clang-release

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.preset }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Setup Python for Conan
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libc++-dev \
            libc++abi-dev \
            ninja-build \
            ccache \
            cmake

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install conan==${{ env.CONAN_VERSION }}
          conan profile detect --force

      - name: Build via script
        run: ./scripts/build.sh ${{ matrix.preset }}

      - name: Run tests via script
        run: ./scripts/test.sh ${{ matrix.preset }}

      - name: Upload build artifacts
        if: endsWith(matrix.preset, 'release')
        uses: actions/upload-artifact@v4
        with:
          name: fqcompressor-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/src/fqc
          retention-days: 7

  # ===========================================================================
  # Commit Lint Job (PR only)
  # ===========================================================================
  # Validates commit messages follow Conventional Commits format.
  # ===========================================================================
  commit-lint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node.js for commitlint
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and run commitlint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional
          commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
