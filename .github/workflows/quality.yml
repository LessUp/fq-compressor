# .github/workflows/quality.yml
#
# Code Quality Checks for fq-compressor
# Runs on every PR and push to main/master branch

name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONAN_VERSION: 2.24.0

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: ./scripts/lint.sh format-check

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            clang-tidy \
            libc++-dev \
            libc++abi-dev \
            ninja-build \
            ccache \
            cmake

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install conan==${{ env.CONAN_VERSION }}
          conan profile detect --force

      - name: Set Clang compiler environment
        run: |
          echo "CC=clang" >> "$GITHUB_ENV"
          echo "CXX=clang++" >> "$GITHUB_ENV"

      - name: Build analysis preset
        run: ./scripts/build.sh clang-debug

      - name: Run clang-tidy
        run: ./scripts/lint.sh lint clang-debug

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [format-check, static-analysis]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.format-check.result }}" != "success" ]]; then
            echo "Format check failed"
            exit 1
          fi
          if [[ "${{ needs.static-analysis.result }}" != "success" ]]; then
            echo "Static analysis failed"
            exit 1
          fi
          echo "All quality checks passed!"
