# .github/workflows/quality.yml
#
# Code Quality Checks for fq-compressor
# Runs on every PR and push to main/master branch

name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_IMAGE_NAME: fqcompressor-quality

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CI toolchain image
        run: |
          docker build \
            -f docker/Dockerfile.dev \
            --target base \
            -t ${{ env.CI_IMAGE_NAME }}:format \
            .

      - name: Check formatting
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:format \
            ./scripts/lint.sh format-check

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-clang-debug-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-clang-debug-
            ccache-${{ runner.os }}-

      - name: Prepare container cache mounts
        run: |
          mkdir -p "$HOME/.conan2" "$HOME/.cache/ccache"

      - name: Build CI toolchain image
        run: |
          docker build \
            -f docker/Dockerfile.dev \
            --target base \
            -t ${{ env.CI_IMAGE_NAME }}:clang-debug \
            .

      - name: Build analysis preset
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.conan2:/tmp/conan2" \
            -v "$HOME/.cache/ccache:/tmp/ccache" \
            -e HOME=/tmp \
            -e CONAN_HOME=/tmp/conan2 \
            -e CCACHE_DIR=/tmp/ccache \
            -e PATH=/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:clang-debug \
            ./scripts/build.sh clang-debug

      - name: Run clang-tidy
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.conan2:/tmp/conan2" \
            -v "$HOME/.cache/ccache:/tmp/ccache" \
            -e HOME=/tmp \
            -e CONAN_HOME=/tmp/conan2 \
            -e CCACHE_DIR=/tmp/ccache \
            -e PATH=/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin \
            -w /workspace \
            ${{ env.CI_IMAGE_NAME }}:clang-debug \
            ./scripts/lint.sh lint clang-debug

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [format-check, static-analysis]
    if: always()

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.format-check.result }}" != "success" ]]; then
            echo "Format check failed"
            exit 1
          fi
          if [[ "${{ needs.static-analysis.result }}" != "success" ]]; then
            echo "Static analysis failed"
            exit 1
          fi
          echo "All quality checks passed!"
