name: Documentation Quality

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/website/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-quality.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'docs/website/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/docs-quality.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  honkit-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build documentation site
        run: npm run docs:build
