name: Documentation Quality

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'README.md'
      - 'README.zh-CN.md'
      - 'docs/**'
      - 'package.json'
      - '.github/workflows/docs-quality.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'README.md'
      - 'README.zh-CN.md'
      - 'docs/**'
      - 'package.json'
      - '.github/workflows/docs-quality.yml'

permissions:
  contents: read

jobs:
  honkit-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install documentation dependencies
        run: npm install

      - name: Build documentation site
        run: npm run docs:build
