name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CONAN_VERSION: 2.24.0

jobs:
  release-linux:
    name: Build and Release Linux Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py') }}
          restore-keys: |
            ${{ runner.os }}-conan-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc g++ ninja-build ccache cmake

      - name: Install Conan
        run: |
          python -m pip install --upgrade pip
          pip install conan==${{ env.CONAN_VERSION }}
          conan profile detect --force

      - name: Build release binary
        run: ./scripts/build.sh gcc-release

      - name: Run release tests
        run: ./scripts/test.sh gcc-release

      - name: Prepare release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          ARTIFACT_DIR="release-artifacts"
          mkdir -p "$ARTIFACT_DIR"
          cp build/gcc-release/src/fqc "$ARTIFACT_DIR/fqc"
          tar -C "$ARTIFACT_DIR" -czf "$ARTIFACT_DIR/fq-compressor-${VERSION}-linux-x86_64.tar.gz" fqc
          sha256sum "$ARTIFACT_DIR/fq-compressor-${VERSION}-linux-x86_64.tar.gz" > "$ARTIFACT_DIR/fq-compressor-${VERSION}-linux-x86_64.tar.gz.sha256"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/fq-compressor-${{ github.ref_name }}-linux-x86_64.tar.gz
            release-artifacts/fq-compressor-${{ github.ref_name }}-linux-x86_64.tar.gz.sha256
