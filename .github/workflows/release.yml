name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version from the repository VERSION file (without the v prefix)
        required: true
        type: string
      dry_run:
        description: Build and upload artifacts without creating a GitHub Release
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  CONAN_VERSION: 2.24.0
  BINARY_NAME: fqc
  PROJECT_NAME: fq-compressor

jobs:
  validate:
    name: Validate release identity
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate VERSION and trigger
        id: version
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          read -r VERSION_VALUE < VERSION
          if ! cmp -s VERSION <(printf '%s\n' "$VERSION_VALUE"); then
            echo "::error::VERSION must contain exactly one newline-terminated line"
            exit 1
          fi
          if [[ ! "$VERSION_VALUE" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid VERSION value: $VERSION_VALUE"
            exit 1
          fi

          EXPECTED_TAG="v${VERSION_VALUE}"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            if [[ "$GITHUB_REF_TYPE" != "tag" || "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]]; then
              echo "::error::Tag $GITHUB_REF_NAME does not match VERSION ($EXPECTED_TAG)"
              exit 1
            fi
          else
            if [[ "$REQUESTED_VERSION" != "$VERSION_VALUE" ]]; then
              echo "::error::Requested version ($REQUESTED_VERSION) does not match VERSION ($VERSION_VALUE)"
              exit 1
            fi
            if [[ "$DRY_RUN" != "true" ]]; then
              echo "::error::Manual workflow runs must use dry_run=true"
              exit 1
            fi
          fi

          PRERELEASE=false
          if [[ "$VERSION_VALUE" == *-* ]]; then
            PRERELEASE=true
          fi
          echo "version=$VERSION_VALUE" >> "$GITHUB_OUTPUT"
          echo "tag=$EXPECTED_TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build-linux-glibc:
    name: Linux glibc (x86_64)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build portable GCC glibc binary
        run: |
          docker build \
            -f docker/Dockerfile.glibc-release \
            --output type=local,dest=out \
            .

      - name: Smoke-test native binary
        run: |
          chmod +x out/${{ env.BINARY_NAME }}
          file out/${{ env.BINARY_NAME }}
          out/${{ env.BINARY_NAME }} --version | grep -Fx '${{ needs.validate.outputs.version }}'
          FQC_BIN="${PWD}/out/${{ env.BINARY_NAME }}" bash tests/e2e/cli_smoke_test.sh

      - name: Prepare minimal archive
        run: |
          STAGING="${{ env.PROJECT_NAME }}-${{ needs.validate.outputs.tag }}-linux-x86_64-glibc"
          mkdir "$STAGING"
          install -m 0755 out/${{ env.BINARY_NAME }} "$STAGING/${{ env.BINARY_NAME }}"
          install -m 0644 README.md LICENSE CHANGELOG.md "$STAGING/"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          echo "ASSET=$STAGING.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-x86_64-glibc
          path: ${{ env.ASSET }}
          if-no-files-found: error

  build-linux-musl:
    name: Linux musl (x86_64)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build portable static GCC musl binary
        run: |
          docker build \
            -f docker/Dockerfile.musl-release \
            --output type=local,dest=out \
            .

      - name: Smoke-test native binary
        run: |
          chmod +x out/${{ env.BINARY_NAME }}
          file out/${{ env.BINARY_NAME }}
          out/${{ env.BINARY_NAME }} --version | grep -Fx '${{ needs.validate.outputs.version }}'
          FQC_BIN="${PWD}/out/${{ env.BINARY_NAME }}" bash tests/e2e/cli_smoke_test.sh

      - name: Prepare minimal archive
        run: |
          STAGING="${{ env.PROJECT_NAME }}-${{ needs.validate.outputs.tag }}-linux-x86_64-musl"
          mkdir "$STAGING"
          install -m 0755 out/${{ env.BINARY_NAME }} "$STAGING/${{ env.BINARY_NAME }}"
          install -m 0644 README.md LICENSE CHANGELOG.md "$STAGING/"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          echo "ASSET=$STAGING.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-x86_64-musl
          path: ${{ env.ASSET }}
          if-no-files-found: error

  build-macos:
    name: macOS (x86_64)
    needs: validate
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: macos-x86_64-conan-${{ hashFiles('conanfile.py', 'VERSION') }}
          restore-keys: macos-x86_64-conan-

      - name: Install build tools and GCC 15
        run: |
          brew install cmake ninja ccache gcc@15
          echo "CC=$(brew --prefix gcc@15)/bin/gcc-15" >> "$GITHUB_ENV"
          echo "CXX=$(brew --prefix gcc@15)/bin/g++-15" >> "$GITHUB_ENV"

      - name: Install Conan
        run: |
          pip install conan==${{ env.CONAN_VERSION }}
          conan profile detect --force

      - name: Install Conan dependencies
        run: |
          conan install . \
            --output-folder=build/release \
            --build=missing \
            -s build_type=Release \
            -s compiler.cppstd=23

      - name: Configure and build portable binary
        run: |
          cmake -B build/release -S . -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=build/release/build/Release/generators/conan_toolchain.cmake \
            -DCMAKE_C_COMPILER=${{ env.CC }} \
            -DCMAKE_CXX_COMPILER=${{ env.CXX }} \
            -DCMAKE_CXX_FLAGS_RELEASE="-O3 -DNDEBUG" \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
            -DFQC_PORTABLE=ON \
            -DBUILD_TESTING=OFF \
            -DENABLE_COVERAGE=OFF
          cmake --build build/release -j "$(sysctl -n hw.ncpu)"

      - name: Smoke-test native binary
        run: |
          file build/release/src/${{ env.BINARY_NAME }}
          build/release/src/${{ env.BINARY_NAME }} --version | grep -Fx '${{ needs.validate.outputs.version }}'
          FQC_BIN="${PWD}/build/release/src/${{ env.BINARY_NAME }}" bash tests/e2e/cli_smoke_test.sh

      - name: Prepare minimal archive
        run: |
          STAGING="${{ env.PROJECT_NAME }}-${{ needs.validate.outputs.tag }}-macos-x86_64"
          mkdir "$STAGING"
          install -m 0755 build/release/src/${{ env.BINARY_NAME }} "$STAGING/${{ env.BINARY_NAME }}"
          install -m 0644 README.md LICENSE CHANGELOG.md "$STAGING/"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          echo "ASSET=$STAGING.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: macos-x86_64
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish prerelease
    if: github.event_name == 'push'
    needs: [validate, build-linux-glibc, build-linux-musl, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir release-assets
          find artifacts -type f -name '*.tar.gz' -exec cp '{}' release-assets/ \;
          test "$(find release-assets -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 3
          ls -la release-assets

      - name: Generate SHA-256 manifest
        working-directory: release-assets
        run: sha256sum *.tar.gz > checksums-sha256.txt

      - name: Write release-candidate notes
        env:
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          {
            echo "# fq-compressor ${RELEASE_TAG}"
            echo
            echo "This is a release candidate for the sequential FQC v2 CLI."
            echo
            echo "- FQC v2 archives are intentionally incompatible with v1."
            echo "- The supported compatibility surface is the \`fqc\` CLI only; no stable C++ API or ABI is provided."
            echo "- The supported release architecture is x86_64 only."
            echo "- Every artifact was smoke-tested on its native x86_64 runner."
            echo "- The release includes portable GCC glibc/musl Linux builds and a native macOS x86_64 build."
            echo "- Non-WSL2 performance qualification was explicitly waived for this release candidate."
            echo
            echo "Verify downloads with \`sha256sum -c checksums-sha256.txt\`."
          } > release-notes.md

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: fq-compressor ${{ needs.validate.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ needs.validate.outputs.prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: false
