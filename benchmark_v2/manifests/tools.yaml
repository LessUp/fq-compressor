tools:
  - tool_id: fqc
    name: fq-compressor
    category: reference
    supports_paired: true
    version_cmd: fqc --version
    compress_template: fqc compress -i {input} -o {output}
    decompress_template: fqc decompress -i {input} -o {output}
    description: High-performance FASTQ compressor with ABC+SCM pipeline
    claim_scope: local-supported
    scope_note: Primary project binary; included in every tracked local benchmark run.
  - tool_id: gzip
    name: gzip
    category: baseline
    supports_paired: false
    version_cmd: gzip --version | head -1
    compress_template: gzip -c {input} > {output}
    decompress_template: gzip -dc {input} > {output}
    description: Standard general-purpose compressor
    claim_scope: local-supported
    scope_note: Included in the supported local comparison set.
  - tool_id: xz
    name: xz
    category: baseline
    supports_paired: false
    version_cmd: xz --version | head -1
    compress_template: xz -c {input} > {output}
    decompress_template: xz -dc {input} > {output}
    description: High compression ratio general compressor
    claim_scope: local-supported
    scope_note: Included in the supported local comparison set.
  - tool_id: bzip2
    name: bzip2
    category: baseline
    supports_paired: false
    version_cmd: bzip2 --version 2>&1 | head -1
    compress_template: bzip2 -c {input} > {output}
    decompress_template: bzip2 -dc {input} > {output}
    description: Block-sorting compression
    claim_scope: local-supported
    scope_note: Included in the supported local comparison set.
  - tool_id: spring
    name: Spring
    category: reference
    supports_paired: true
    version_cmd: spring --version 2>&1 || echo unknown
    compress_template: spring -c -i {input} -o {output}
    decompress_template: spring -d -i {input} -o {output}
    description: Assembly-based FASTQ compressor
    claim_scope: deferred-specialized-peer
    scope_note: Configured as a target peer but deferred until the local Spring toolchain is integrated and validated.
