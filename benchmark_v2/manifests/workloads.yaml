workloads:
  - workload_id: small20k-single
    layout: single
    inputs: ["small/test_1.fq.gz"]
    read_limit: 20000
    tier: dev
    comparable_tools: [fqc, gzip, xz, bzip2]
  - workload_id: small20k-paired
    layout: paired
    inputs: ["small/test_1.fq.gz", "small/test_2.fq.gz"]
    read_limit: 20000
    tier: dev
    comparable_tools: [fqc]
  - workload_id: big100k-single
    layout: single
    inputs: ["big/test_bgi_1.fq.gz"]
    read_limit: 100000
    tier: scale
    comparable_tools: [fqc, gzip, xz, bzip2]
  - workload_id: big100k-paired
    layout: paired
    inputs: ["big/test_bgi_1.fq.gz", "big/test_bgi_2.fq.gz"]
    read_limit: 100000
    tier: scale
    comparable_tools: [fqc]
