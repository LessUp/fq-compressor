# Run environment — 2026-07-13
# Copy this template for each new run date.

host:
  cpu: "AMD Ryzen 7 5800H (8-core/16-thread)"
  arch: x86_64
os:
  kernel: "Linux 6.18.33.2-microsoft-standard-WSL2"
compiler:
  name: clang
  version: "21"
preset: clang-release
harness: tests/e2e/test_performance.sh
params:
  FQC_PERF_SIZES: "64"
  FQC_PERF_REPEATS: "3"
  FQC_PERF_DATA: "random"
  FQC_PERF_MEMORY_MIB: "64"
  FQC_PERF_ENFORCE_SLA: "1"
  FQC_PERF_KEEP_TEMP: "1"
notes:
  - "WSL2 wall-clock noise is high; re-runs can drop Illumina compress below 50 MiB/s."
  - "ARM64 unverified; real biological corpora not claimed."
